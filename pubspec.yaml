name: very_good_games
description: "A daily puzzle hub — collection of brain teasers and games."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  bloc: ^9.0.0
  drift: ^2.26.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_markdown: ^0.7.6
  flutter_secure_storage: ^9.0.0
  go_router: ^15.1.2
  ndk: ^0.8.1
  nostr_identity:
    path: packages/nostr_identity
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.32

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
