version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  drift: ^2.26.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  ndk: ^0.8.1
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.32

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0
